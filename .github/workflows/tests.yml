name: Tests
on:
  pull_request:
  push:
    branches: [ main ]
jobs:
  django:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python manage.py check
      - run: python manage.py migrate --noinput
